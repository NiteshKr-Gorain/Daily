<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self.com</title>
    <link rel="stylesheet" href="Css/index.css">
    <script src="JavaScript/index.js" defer></script>
    <link rel="stylesheet" href="Css/style.css">

</head>
<body>
    <header>
        <div class="nav-logo">
            <span><a href="index.html">Daily Manager</a></span>
        </div>
        <div class="nav-list">
            <ul>
                <li class="nav-link"><a href="index.html">Home</a></li>
                <li class="nav-link"><a href="habit.html">Habits</a></li>
                <li class="nav-link"><a href="planner.html">Planner</a></li>
                <li class="nav-link"><a href="note.html">Notes</a></li>
                <li class="nav-link"><a href="progress.html">Progress</a></li>
                <li class="nav-link"><a href="profile.html">Profile</a></li>
            </ul>
        </div>
    </header>

    <!-- for the greeting bar -->

    <div class="real">
        <h1 id="greeting"></h1>
        <p id="date"></p>
    </div>

    <!-- status bar code -->
    
    <div class="status-bar">
        <div class="total">
            <h2>Total Habits</h2>
            <p id="total-habit">0</p>
        </div>
        
        <div class="total">
            <h2>Everyday Habits</h2>
            <p id="completed-habit">0</p>
        </div>
        
        <div class="total">
            <h2>Total Tasks Today</h2>
            <p id="total-task">0</p>

        </div>
    </div>

    <!-- Habits Summary Section -->
    <section class="habits-summary-section" style="margin: 30px auto; max-width: 1200px; padding: 0 20px;">
        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <h2 style="margin: 0 0 15px 0;">Your Habits Progress</h2>
            <p style="margin: 0; opacity: 0.9;">Track your daily habits and build consistency. Visit the <a href="habit.html" style="color: #fff; text-decoration: underline;">Habits page</a> to manage your habits.</p>
        </div>
    </section>
    
</body>
</html>
