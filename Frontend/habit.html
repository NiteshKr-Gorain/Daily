<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self/Habits.com</title>
    <link rel="stylesheet" href="Css/habit.css">
    <script src="JavaScript/habit.js" defer></script>
    <link rel="stylesheet" href="Css/style.css">

</head>
<body>
    <header>
        <div class="nav-logo">
            <span><a href="index.html">Daily Manager</a></span>
        </div>
        <div class="nav-list">
            <ul>
                <li class="nav-link"><a href="index.html">Home</a></li>
                <li class="nav-link"><a href="habit.html">Habits</a></li>
                <li class="nav-link"><a href="planner.html">Planner</a></li>
                <li class="nav-link"><a href="note.html">Notes</a></li>
                <li class="nav-link"><a href="progress.html">Progress</a></li>
                <li class="nav-link"><a href="profile.html">Profile</a></li>
            </ul>

        </div>
    </header>

    <!-- Daily habits list -->

    <div class="habits-text">
        <h1>
            Daily Habbits
        </h1>
        <p>
            Track your daily routines to build better habits.
        </p>
    </div>

    <!-- list for the daily habits -->

    <section id="habit-week-section">
        <div class="container">
            <div class="habit-summary">
                <strong>Total Habits:</strong> <span id="habit-total">0</span>
                &nbsp;|&nbsp;
                <strong>Completed Habits</strong> <span id="habit-completed">0</span>
            </div>

            <input type="text" id="habit-bar" placeholder="Example: Reading, Exercise, Meditation">
            <button id="add-habits-btn">Add Habit</button>

            <table id="habit-table">
                <thead>
                    <tr>
                        <th>Habit</th>
                        <th>Sun</th>
                        <th>Mon</th>
                        <th>Tue</th>
                        <th>Wed</th>
                        <th>Thu</th>
                        <th>Fri</th>
                        <th>Sat</th>
                        <th>Progress %</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="habit-list">
                </tbody>
            </table>
        </div>
    </section>
     
        
     

</body>
</html>
